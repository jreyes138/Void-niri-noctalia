# Noctalia shell configuration
# Docs: https://docs.noctalia.dev/v5/
# This is a minimal starting config. Most settings are at defaults.
# Changes hot-reload via inotify (no restart needed for most options).

# ── Shell ─────────────────────────────────────────────────────────────────────

[shell]
font_family           = "JetBrainsMono Nerd Font"
time_format           = "{:%H:%M}"
date_format           = "%A, %x"
offline_mode          = false
telemetry_enabled     = false
polkit_agent          = true
password_style        = "default"
settings_show_advanced = false
middle_click_opens_widget_settings = true
show_location         = true
clipboard_enabled     = true
clipboard_history_max_entries = 100
clipboard_auto_paste  = "auto"

[shell.privacy]
mic_filter_regex = ""
cam_filter_regex = ""
screen_filter_regex = ""

[shell.animation]
enabled = true
speed   = 1.0

[shell.shadow]
direction = "down"
alpha     = 0.55

[shell.panel]
transparency_mode     = "solid"
borders               = true
shadow                = true
launcher_placement       = "attached"
clipboard_placement      = "attached"
control_center_placement = "attached"
wallpaper_placement      = "attached"
session_placement        = "attached"

[shell.mpris]
blacklist = []

# ── Wallpaper ─────────────────────────────────────────────────────────────────

[wallpaper]
enabled             = true
fill_mode           = "crop"
transition          = ["fade", "wipe", "disc", "stripes", "zoom", "honeycomb"]
transition_duration = 1500
edge_smoothness     = 0.3
transition_on_startup = false
directory           = "~/Pictures/Wallpapers"
directory_light     = ""
directory_dark      = ""

[wallpaper.default]
path = ""

[wallpaper.automation]
enabled                    = false

order                      = "random"
recursive                  = true

# ── Theme ─────────────────────────────────────────────────────────────────────

[theme]
mode   = "dark"
source = "builtin"
builtin = "Noctalia"


[theme.templates]
enable_builtin_templates            = true
builtin_ids                = ["ghostty"]
enable_community_templates = true
community_ids              = ["neovim", "yazi"]

# ── Backdrop (for niri blurred overview) ──────────────────────────────────────

[backdrop]
enabled                = true
blur_intensity         = 0.5
tint_intensity         = 0.3

# ── Notifications ─────────────────────────────────────────────────────────────

[notification]
enable_daemon      = true
show_app_name      = true
show_actions       = true
layer              = "top"
scale              = 1.0
background_opacity = 0.97
offset_x           = 20
offset_y           = 8

# ── OSD ───────────────────────────────────────────────────────────────────────

[osd]
position = "top_right"
position_vertical = "top_center"
orientation = "horizontal"
scale = 1.0
background_opacity = 0.97
offset_x = 20
offset_y = 8

[osd.kinds]
volume = true
volume_output = true
volume_input = true
brightness = true
wifi = true
bluetooth = true
power_profile = true
caffeine = true
nightlight = true
dnd = true
lock_keys = true
keyboard_layout = true
privacy = true

# ── Lock Screen ───────────────────────────────────────────────────────────────

[lockscreen]
enabled                 = true
blurred_desktop         = false
blur_intensity          = 0.5
tint_intensity          = 0.3

# ── System Monitor ────────────────────────────────────────────────────────────

[system.monitor]
enabled = true
cpu_poll_seconds = 2.0
gpu_poll_seconds = 5.0
memory_poll_seconds = 2.0
network_poll_seconds = 3.0
disk_poll_seconds = 10.0

# ── Weather ───────────────────────────────────────────────────────────────────

[weather]
enabled         = false
refresh_minutes = 30
unit            = "celsius"
effects         = true

# ── Audio ─────────────────────────────────────────────────────────────────────

[audio]
enable_overdrive = false
enable_sounds = false
sound_volume = 0.5

# ── Brightness ────────────────────────────────────────────────────────────────

[brightness]
enable_ddcutil = false

# ── Night Light ───────────────────────────────────────────────────────────────

[nightlight]
enabled              = false
force                = false
temperature_day      = 6500
temperature_night    = 4000

# ── Location ──────────────────────────────────────────────────────────────────

[location]
auto_locate      = false
address          = ""

# ── Idle ──────────────────────────────────────────────────────────────────────

[idle.behavior.lock]
timeout = 600
action = "lock"
enabled = false

[idle.behavior.screen-off]
timeout = 660
action = "screen_off"
enabled = false

# ── Keybinds (Noctalia internal) ──────────────────────────────────────────────

[keybinds]
validate = ["return", "kp_enter", "space"]
cancel   = ["escape"]
left     = ["left"]
right    = ["right"]
up       = ["up"]
down     = ["down"]
tab_next = ["tab"]
tab_previous = ["shift+iso_left_tab"]

# ── Bar ───────────────────────────────────────────────────────────────────────

[bar.main]
position           = "top"
thickness          = 34
background_opacity = 0.0
radius             = 0
margin_ends        = 0

padding            = 14
widget_spacing     = 6
scale              = 1.0
shadow             = false
auto_hide          = false
reserve_space      = true
capsule            = false

start  = ["launcher", "wallpaper", "workspaces"]
center = ["clock"]
end    = ["media", "tray", "notifications", "clipboard", "network", "bluetooth", "volume", "brightness", "battery", "control-center", "session"]

# ── Dock ──────────────────────────────────────────────────────────────────────

[dock]
enabled             = true
position            = "bottom"
icon_size           = 48
main_axis_padding   = 16
cross_axis_padding  = 8
item_spacing        = 6
background_opacity  = 0.88
radius              = 16

shadow              = true
show_running        = true
auto_hide           = false
reserve_space       = true
active_scale        = 1.0
inactive_scale      = 0.85
magnification       = true
magnification_scale = 1.45
active_opacity      = 1.0
inactive_opacity    = 0.85
show_dots           = false
show_instance_count = true
launcher_position   = "none"
launcher_icon       = "grid-dots"
active_monitor_only = false
pinned              = []

# ── Hooks ────────────────────────────────────────────────────────────────────
[hooks]
colors_changed = ["noctalia-sync-themes"]